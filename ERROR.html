<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #000000;
      --fg: #ffffff;
      --muted: #6b7280;
      --accent: #22d3ee;
      --accent-glow: rgba(34, 211, 238, 0.4);
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* --- Canvas Background --- */
    #canvas-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* --- Gradient Overlay --- */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, #000000 90%);
      z-index: 1;
      pointer-events: none;
    }

    /* --- Main Layout --- */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 700px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    /* --- Loader Section --- */
    .loader-section {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 150px;
      position: relative;
    }

    /* Hexagon Loader */
    .hex-spinner {
      position: relative;
      width: 100px;
      height: 100px;
    }

    .hex-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid transparent;
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
    }

    .hex-ring:nth-child(2) {
      width: 75%;
      height: 75%;
      top: 12.5%;
      left: 12.5%;
      border-top-color: transparent;
      border-right-color: var(--accent);
      animation-duration: 3s;
    }

    .hex-ring:nth-child(3) {
      width: 50%;
      height: 50%;
      top: 25%;
      left: 25%;
      border-top-color: var(--accent);
      border-right-color: transparent;
      animation-duration: 1.5s;
      animation-direction: reverse;
    }

    .core-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 50%;
      filter: blur(15px);
      opacity: 0.5;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; }
    }

    /* --- Content Section --- */
    .content-section {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .status-badge {
      display: inline-block;
      margin: 0 auto;
      padding: 6px 12px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 4px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .description {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* --- Terminal Log --- */
    .terminal-container {
      background: rgba(10, 10, 10, 0.8);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
      border-radius: 8px;
      text-align: left;
      font-size: 13px;
      color: #ccc;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .terminal-line {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }

    .terminal-line:last-child {
      margin-bottom: 0;
    }

    .prompt {
      color: var(--accent);
    }

    .typing-cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: var(--accent);
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* --- Features Grid --- */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 6px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .feature-item:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--border);
      transform: translateY(-2px);
    }

    .feature-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(34, 211, 238, 0.1);
      border-radius: 6px;
      color: var(--accent);
    }

    .feature-text {
      font-size: 0.9rem;
      color: #ccc;
    }

    /* --- Telegram CTA --- */
    .cta-container {
      margin-top: 1rem;
    }

    .telegram-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 1rem;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.1) 0%, rgba(34, 211, 238, 0.02) 100%);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .telegram-btn:hover {
      background: rgba(34, 211, 238, 0.15);
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
      border-color: var(--accent);
    }

    .telegram-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* --- Footer --- */
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      opacity: 0.5;
      margin-top: 2rem;
    }

    /* --- Animations --- */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease forwards;
    }

    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .features-grid {
        grid-template-columns: 1fr;
      }
      .container {
        padding: 1.5rem;
        gap: 2rem;
      }
      h1 {
        font-size: 2.5rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>

  <canvas id="canvas-bg"></canvas>
  <div class="vignette"></div>

  <div class="container">
    
    <!-- Loader -->
    <div class="loader-section fade-in delay-1">
      <div class="hex-spinner">
        <div class="hex-ring"></div>
        <div class="hex-ring"></div>
        <div class="hex-ring"></div>
        <div class="core-glow"></div>
      </div>
    </div>

    <!-- Content -->
    <div class="content-section">
      <span class="status-badge mono fade-in delay-1">System Maintenance</span>
      <h1 class="fade-in delay-2">We'll Be Back Soon</h1>
      <p class="description fade-in delay-2">
        We're performing necessary upgrades to enhance performance and stability. Thank you for your patience.
      </p>
    </div>

    <!-- Terminal Status -->
    <div class="terminal-container mono fade-in delay-3" id="terminal">
      <div class="terminal-line">
        <span class="prompt">></span>
        <span id="terminal-text">Initializing updates...</span>
        <span class="typing-cursor"></span>
      </div>
    </div>

    <!-- Features -->
    <div class="features-grid fade-in delay-3">
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <span class="feature-text">Performance Boost</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <span class="feature-text">Security Patches</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>
        <span class="feature-text">System Optimization</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <span class="feature-text">Bug Fixes</span>
      </div>
    </div>

    <!-- Telegram Support -->
    <div class="cta-container fade-in delay-4">
      <a href="https://t.me/ERROR_2ND" target="_blank" class="telegram-btn" aria-label="Contact on Telegram">
        <svg viewBox="0 0 24 24">
          <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
        </svg>
        <span>Need help? Contact @ERROR_2ND</span>
      </a>
    </div>

    <footer class="footer fade-in delay-4">
      &copy; 2023 All rights reserved.
    </footer>

  </div>

  <script>
    // --- Canvas Background Animation ---
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.5 + 0.2;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > width) this.speedX *= -1;
        if (this.y < 0 || this.y > height) this.speedY *= -1;
      }

      draw() {
        ctx.fillStyle = `rgba(34, 211, 238, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function init() {
      particles = [];
      const count = Math.floor((width * height) / 20000);
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function connectParticles() {
      const maxDist = 120;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < maxDist) {
            const opacity = (1 - dist / maxDist) * 0.15;
            ctx.strokeStyle = `rgba(34, 211, 238, ${opacity})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      connectParticles();
      requestAnimationFrame(animate);
    }

    // Check for reduced motion
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (!prefersReducedMotion) {
      resize();
      init();
      animate();
      window.addEventListener('resize', () => {
        resize();
        init();
      });
    }

    // --- Terminal Animation ---
    const terminalText = document.getElementById('terminal-text');
    const messages = [
      'Initializing updates...',
      'Optimizing database...',
      'Clearing server cache...',
      'Applying security patches...',
      'Verifying file integrity...',
      'Finalizing changes...'
    ];
    let msgIndex = 0;

    function cycleMessage() {
      if (prefersReducedMotion) return;
      
      terminalText.style.opacity = 0;
      setTimeout(() => {
        msgIndex = (msgIndex + 1) % messages.length;
        terminalText.textContent = messages[msgIndex];
        terminalText.style.opacity = 1;
      }, 400);
    }

    terminalText.style.transition = 'opacity 0.4s ease';
    setInterval(cycleMessage, 2500);

  </script>
</body>
</html>
