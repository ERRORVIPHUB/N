<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #000000;
      --fg: #e4e4e7;
      --muted: #71717a;
      --accent: #22d3ee;
      --accent-dark: #0891b2;
      --telegram-bg: #0088cc;
      --card-bg: rgba(12, 12, 12, 0.8);
      --border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* --- Background --- */
    #canvas-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* --- Layout --- */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 640px;
      padding: 1.5rem;
    }

    /* --- Card --- */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 2rem;
      opacity: 0;
      transform: translateY(30px);
      animation: entryAnim 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes entryAnim {
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Loader --- */
    .loader-container {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .loader-spinner {
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
      position: relative;
    }
    
    .loader-spinner::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 3px solid transparent;
      border-top-color: var(--accent-dark);
      border-radius: 50%;
      animation: spin 2s linear reverse infinite;
    }

    .loader-core {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 20px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 50% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; } }

    /* --- Text --- */
    .status-badge {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(34, 211, 238, 0.1);
      padding: 6px 12px;
      border-radius: 50px;
      border: 1px solid rgba(34, 211, 238, 0.2);
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      background: linear-gradient(180deg, #fff 30%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    p.desc {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 380px;
    }

    /* --- Telegram Button (Key Feature) --- */
    .telegram-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      padding: 1.25rem 1.5rem;
      background: linear-gradient(135deg, var(--telegram-bg) 0%, #0077b5 100%);
      border-radius: 14px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px rgba(0, 136, 204, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .telegram-btn:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 10px 30px rgba(0, 136, 204, 0.5);
    }

    .telegram-btn svg {
      width: 24px;
      height: 24px;
      fill: white;
      flex-shrink: 0;
    }

    .btn-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.2;
    }

    .btn-title {
      font-size: 0.8rem;
      font-weight: 500;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-username {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* --- Terminal --- */
    .terminal-box {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      text-align: left;
      font-size: 13px;
      color: var(--muted);
    }

    .terminal-line { margin-bottom: 4px; display: flex; gap: 8px; }
    .term-green { color: #4ade80; }
    .term-cyan { color: var(--accent); }
    .cursor { display: inline-block; width: 6px; height: 14px; background: var(--accent); animation: blink 1s infinite; vertical-align: middle; }
    @keyframes blink { 50% { opacity: 0; } }

    /* --- Footer --- */
    .footer-line {
      font-size: 12px;
      color: var(--muted);
      opacity: 0.6;
    }

    @media (max-width: 640px) {
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <canvas id="canvas-bg"></canvas>
  <div class="vignette"></div>

  <div class="container">
    <div class="card">
      
      <!-- Loader -->
      <div class="loader-container">
        <div class="loader-spinner"></div>
        <div class="loader-core"></div>
      </div>

      <!-- Header -->
      <div>
        <span class="status-badge mono">System Updating</span>
        <h1 style="margin-top: 1rem;">We'll Be Back Soon</h1>
        <p class="desc" style="margin-top: 1rem;">
          We're performing scheduled upgrades to enhance performance. Thank you for your patience.
        </p>
      </div>

      <!-- Telegram Contact (Prominent) -->
      <a href="https://t.me/ERROR_2ND" target="_blank" class="telegram-btn" aria-label="Contact us on Telegram">
        <svg viewBox="0 0 24 24">
          <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
        </svg>
        <div class="btn-content">
          <span class="btn-title">Need Help?</span>
          <span class="btn-username">@ERROR_2ND</span>
        </div>
      </a>

      <!-- Terminal Log -->
      <div class="terminal-box mono">
        <div class="terminal-line">
          <span class="term-green">SUCCESS</span>
          <span>Core modules updated.</span>
        </div>
        <div class="terminal-line">
          <span class="term-cyan">INFO</span>
          <span id="log-text">Applying security patches...</span>
          <span class="cursor"></span>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer-line">
        Thank you for your patience.
      </div>

    </div>
  </div>

  <script>
    // --- Particle Background ---
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    }

    function initParticles() {
      particles = [];
      const count = Math.floor((canvas.width * canvas.height) / 15000);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.5 + 0.5,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          a: Math.random() * 0.5 + 0.2
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(34, 211, 238, ${p.a})`;
        ctx.fill();
      });

      // Draw lines
      for(let i=0; i<particles.length; i++) {
        for(let j=i+1; j<particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < 100) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(34, 211, 238, ${(1-dist/100)*0.15})`;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }

    // Reduced Motion Check
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(!reducedMotion) {
      resize();
      animate();
      window.addEventListener('resize', resize);
    }

    // --- Terminal Typing ---
    const logText = document.getElementById('log-text');
    const messages = [
      'Applying security patches...',
      'Optimizing database...',
      'Clearing cache files...',
      'Verifying integrity...'
    ];
    let msgIndex = 0;

    function cycleLog() {
      if(reducedMotion) return;
      logText.style.opacity = 0;
      setTimeout(() => {
        msgIndex = (msgIndex + 1) % messages.length;
        logText.textContent = messages[msgIndex];
        logText.style.opacity = 1;
      }, 400);
    }
    
    logText.style.transition = 'opacity 0.4s ease';
    setInterval(cycleLog, 3000);
  </script>
</body>
</html>
